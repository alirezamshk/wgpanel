<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login — WireGuard Panel</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
<div class="login-box">
  <div class="login-logo">
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#0097d4" stroke-width="1.5">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <h1>WireGuard Panel</h1>
    <p>Network Management</p>
  </div>
  {% if error %}<div style="background:#ef444420;border:1px solid #ef444440;color:#ef4444;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:14px">{{ error }}</div>{% endif %}
  <form method="post">
    <div class="form-group"><label>Username</label><input type="text" name="username" autofocus required></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;padding:9px">Sign In</button>
  </form>
  <div class="login-footer">WireGuard Panel — Secure Access</div>
</div>
</body>
</html>
